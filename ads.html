<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reklama</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #131d30;
      color: #e8edf5;
      height: 90px;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }

    .ad-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .ad-texts {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow: hidden;
    }
    .ad-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #00c896;
    }
    .ad-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e8edf5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Countdown doira */
    .ad-timer {
      flex-shrink: 0;
      position: relative;
      width: 38px;
      height: 38px;
    }
    .ad-timer svg {
      transform: rotate(-90deg);
    }
    .t-bg   { fill: none; stroke: #243047; stroke-width: 3; }
    .t-fill {
      fill: none;
      stroke: #00c896;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .t-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #00c896;
    }
  </style>
</head>
<body>

  <div class="ad-icon" id="adIcon">🎯</div>
  <div class="ad-texts">
    <span class="ad-label">Reklama</span>
    <span class="ad-title" id="adTitle">Yuklanmoqda...</span>
  </div>
  <div class="ad-timer">
    <svg width="38" height="38" viewBox="0 0 38 38">
      <circle class="t-bg"   cx="19" cy="19" r="15"/>
      <circle class="t-fill" cx="19" cy="19" r="15" id="tArc"/>
    </svg>
    <div class="t-num" id="tNum">20</div>
  </div>

<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script>
  const BLOCK_IDS = [
    "int-38048",
    "int-38049",
    "int-38050"
  ];

  const TITLES = [
    "Maxsus taklif! Hozir ko'ring",
    "Yangi imkoniyat siz uchun",
    "Eng yaxshi xizmat — bu yerda",
    "Qiziqarli! Ko'proq bilish uchun",
    "Bugun foydali narsa toping"
  ];
  const ICONS = ["🎯","🎁","⚡","🚀","💎","🔥","✨"];

  const INTERVAL = 20;
  const C = 2 * Math.PI * 15; // circumference r=15

  const tArc  = document.getElementById('tArc');
  const tNum  = document.getElementById('tNum');
  const title = document.getElementById('adTitle');
  const icon  = document.getElementById('adIcon');

  tArc.style.strokeDasharray = C;

  let left = INTERVAL;

  function rand(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function updateUI() {
    tNum.textContent = left;
    tArc.style.strokeDashoffset = C * (1 - left / INTERVAL);
  }

  function refreshContent() {
    title.textContent = rand(TITLES);
    icon.textContent  = rand(ICONS);
  }

  function showAd() {
    try {
      const AdController = window.Adsgram.init({ blockId: rand(BLOCK_IDS) });
      AdController.show()
        .then(() => { left = INTERVAL; refreshContent(); })
        .catch(() => { left = INTERVAL; });
    } catch(e) {
      left = INTERVAL;
    }
  }

  refreshContent();
  updateUI();

  setInterval(() => {
    left--;
    if (left <= 0) {
      left = INTERVAL;
      showAd();
    }
    updateUI();
  }, 1000);
</script>
</body>
</html>
